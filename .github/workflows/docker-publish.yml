name: Build and Push Lunar.OS Images

# Trigger this workflow every time code is pushed to the main branch
on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Download your code onto the temporary GitHub server
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx (required for some caching and multi-platform features)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Log in to Docker Hub using the secrets we just created
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 4: Build and Push the Backend
      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: sajid1108/lunar-backend:latest

      # Step 5: Build and Push the Frontend
      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: sajid1108/lunar-frontend:latest
